name: PERN recipe (Compose build)

on:
  push:
    paths:
      - 'docker-stack-recipes/pern-postgres/**'
      - '.github/workflows/pern-recipe.yml'
  pull_request:
    paths:
      - 'docker-stack-recipes/pern-postgres/**'
      - '.github/workflows/pern-recipe.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      POSTGRES_PASSWORD: ci_pern_test
      PERN_SSH_PORT: "2223"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Docker Compose build
        working-directory: docker-stack-recipes/pern-postgres
        run: docker compose build

      - name: Smoke test (Postgres + Node dev + SSH)
        working-directory: docker-stack-recipes/pern-postgres
        run: |
          docker compose up -d --wait
          docker compose exec -T dev node --version
          docker compose exec -T dev pgrep -x sshd
          docker compose exec -T dev pg_isready -h database -U pern
          docker compose exec -T dev sh -c 'psql "$DATABASE_URL" -c "SELECT 1"'

      - name: Smoke cleanup
        if: always()
        working-directory: docker-stack-recipes/pern-postgres
        run: docker compose down

      - name: Scan dev image (Trivy, informational)
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          image-ref: pern-postgres-dev:local
          format: table
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'
          ignore-unfixed: false
          scanners: vuln
