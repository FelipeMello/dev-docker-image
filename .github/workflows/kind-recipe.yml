name: Kind Kubernetes recipe

on:
  push:
    paths:
      - 'docker-stack-recipes/kind-kubernetes/**'
      - '.github/workflows/kind-recipe.yml'
  pull_request:
    paths:
      - 'docker-stack-recipes/kind-kubernetes/**'
      - '.github/workflows/kind-recipe.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  KIND_CLUSTER_NAME: dev-docker-ci

jobs:
  kind-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4.3.1
        with:
          version: v3.18.4

      - name: Create Kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: dev-docker-ci
          config: docker-stack-recipes/kind-kubernetes/kind-config-ci.yaml
          wait: 120s

      - name: kubectl and Helm smoke
        run: |
          set -euo pipefail
          kubectl get nodes
          node_count="$(kubectl get nodes --no-headers 2>/dev/null | wc -l | tr -d ' ')"
          test "$node_count" -eq 2
          helm version
          kubectl apply -f - <<'EOF'
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: kind-recipe-smoke
          spec:
            backoffLimit: 1
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: smoke
                    image: busybox:1.36
                    command: ["sh", "-c", "echo ok"]
          EOF
          kubectl wait --for=condition=complete job/kind-recipe-smoke --timeout=180s

      - name: Delete Kind cluster
        if: always()
        run: kind delete cluster --name dev-docker-ci || true
