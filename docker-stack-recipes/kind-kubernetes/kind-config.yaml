# Local dev default: 1 control-plane + 2 workers (scheduling / spread smoke tests).
# Ingress-ready label + host ports 80/443 on the control-plane node pair with
# scripts/install-ingress.sh (Helm) — see README.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
