# ADVANCED / HEAVY: multiple control-plane nodes (HA-style topology in Kind).
# Expect high RAM and CPU use; not recommended for routine app development.
# Prefer kind-config.yaml (single control-plane + workers) unless you explicitly
# need to exercise multi-CP behaviour locally.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
  - role: control-plane
  - role: control-plane
  - role: worker
  - role: worker
