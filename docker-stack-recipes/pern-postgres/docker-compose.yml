name: pern-postgres

services:
  # PostgreSQL 17 — supported major (see postgresql.org/support/versioning/).
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pern}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pern_dev}
      POSTGRES_DB: ${POSTGRES_DB:-pern}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${PERN_PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Node + PERN-oriented tooling + SSH (sshd on container port 22).
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: pern-postgres-dev:local
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - ./workspace:/workspace
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pern}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pern_dev}
      POSTGRES_DB: ${POSTGRES_DB:-pern}
      DATABASE_URL: postgresql://${POSTGRES_USER:-pern}:${POSTGRES_PASSWORD:-pern_dev}@database:5432/${POSTGRES_DB:-pern}
      SSH_ROOT_PASSWORD: ${SSH_ROOT_PASSWORD:-}
    depends_on:
      database:
        condition: service_healthy
    stdin_open: true
    tty: true
    ports:
      # Default 2223 avoids clashing with another stack on host port 2222; override via PERN_SSH_PORT.
      - "${PERN_SSH_PORT:-2223}:22"
      - "3000:3000"
      - "5173:5173"
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x sshd >/dev/null && node --version >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres-data:
