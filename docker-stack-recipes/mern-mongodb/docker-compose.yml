name: mern-mongodb

services:
  # MongoDB 8.x — current Docker Hub major; follow vendor support lifecycle for production.
  database:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Node + MERN-oriented CLI tooling + SSH (sshd listens on container port 22).
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: mern-mongodb-dev:local
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - ./workspace:/workspace
    environment:
      MONGO_URI: mongodb://database:27017/mern
      # Optional: set in a gitignored .env file (see .env.example), never in this YAML
      SSH_ROOT_PASSWORD: ${SSH_ROOT_PASSWORD:-}
    depends_on:
      database:
        condition: service_healthy
    stdin_open: true
    tty: true
    ports:
      # SSH: daemon uses port 22 inside the container. Host port defaults to 2222
      # so this stack does not fight with the host OS sshd (or GitHub Actions).
      # Use MERN_SSH_PORT=22 docker compose up if you want host :22 instead.
      - "${MERN_SSH_PORT:-2222}:22"
      - "3000:3000"
      - "5173:5173"
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x sshd >/dev/null && node --version >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo-data:
